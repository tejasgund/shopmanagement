<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ledger — Shop &amp; Tenant Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TOKENS
   ============================================================ */
:root{
  --ink:#15201B;
  --paper:#F7F4EC;
  --paper-raised:#FFFFFF;
  --green:#2F6F4F;
  --green-deep:#1F4D38;
  --rust:#C0612B;
  --rust-soft:#F3E3D6;
  --line:#E8E2D2;
  --success:#1F8A6B;
  --success-soft:#E1F0E8;
  --pending-soft:#F3E3D6;
  --partial-soft:#FBEFD0;
  --partial:#A87A12;
  --muted:#6B6457;
  --danger:#B43B2E;
  --danger-soft:#F6E0DC;

  --font-display:'Fraunces', serif;
  --font-body:'Inter', system-ui, sans-serif;
  --font-mono:'JetBrains Mono', monospace;

  --radius:10px;
  --radius-sm:6px;
  --shadow-sm: 0 1px 2px rgba(21,32,27,0.06);
  --shadow-md: 0 4px 16px rgba(21,32,27,0.10);
  --shadow-lg: 0 12px 32px rgba(21,32,27,0.16);

  --sidebar-w: 248px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
h1,h2,h3,h4{font-family:var(--font-display); font-weight:600; margin:0; letter-spacing:-0.01em;}
.mono{font-family:var(--font-mono);}
a{color:inherit;}
button{font-family:var(--font-body); cursor:pointer;}
input,select,textarea{font-family:var(--font-body);}
*:focus-visible{outline:2px solid var(--green); outline-offset:2px; border-radius:4px;}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}

::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-thumb{background:var(--line); border-radius:6px;}
::-webkit-scrollbar-track{background:transparent;}

/* ============================================================
   LOGIN SCREEN
   ============================================================ */
.login-wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:
    radial-gradient(900px 600px at 15% -10%, rgba(47,111,79,0.10), transparent 60%),
    radial-gradient(700px 500px at 110% 110%, rgba(192,97,43,0.08), transparent 60%),
    var(--paper);
}
.login-card{
  width:100%;
  max-width:400px;
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow-lg);
  padding:40px 32px;
  animation:rise 0.5s ease both;
}
@keyframes rise{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
.login-mark{
  display:flex; align-items:center; gap:10px; margin-bottom:28px;
}
.login-mark .stamp-mark{
  width:38px; height:38px; border-radius:8px;
  background:var(--ink); color:var(--paper);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:700; font-size:18px;
  transform:rotate(-4deg);
}
.login-mark .wordmark{font-size:21px;}
.login-mark .wordmark span{color:var(--green); font-style:italic;}
.login-card h1{font-size:24px; margin-bottom:4px;}
.login-sub{color:var(--muted); font-size:13.5px; margin-bottom:28px;}
.field{margin-bottom:18px;}
.field label{
  display:block; font-size:12.5px; font-weight:600; text-transform:uppercase;
  letter-spacing:0.04em; color:var(--muted); margin-bottom:7px;
}
.field input{
  width:100%; padding:11px 13px; border:1.5px solid var(--line);
  border-radius:var(--radius-sm); font-size:15px; background:var(--paper-raised);
  transition:border-color .15s ease;
}
.field input:focus{border-color:var(--green);}
.pw-row{position:relative;}
.pw-toggle{
  position:absolute; right:10px; top:50%; transform:translateY(-50%);
  background:none; border:none; font-size:12px; color:var(--muted); font-weight:600;
  padding:4px 6px;
}
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:11px 18px; border-radius:var(--radius-sm); border:none;
  font-weight:600; font-size:14px; transition:transform .12s ease, box-shadow .12s ease, background .15s ease;
  white-space:nowrap;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--green); color:#fff;}
.btn-primary:hover{background:var(--green-deep);}
.btn-primary:disabled{background:#9FB8AB; cursor:not-allowed; transform:none;}
.btn-block{width:100%;}
.btn-ghost{background:transparent; color:var(--ink); border:1.5px solid var(--line);}
.btn-ghost:hover{border-color:var(--ink);}
.btn-danger-ghost{background:transparent; color:var(--danger); border:1.5px solid var(--danger-soft);}
.btn-danger-ghost:hover{background:var(--danger-soft);}
.btn-sm{padding:6px 11px; font-size:12.5px;}
.btn-icon{padding:8px; border-radius:var(--radius-sm); background:transparent; border:1.5px solid var(--line); color:var(--ink); display:inline-flex;}
.btn-icon:hover{border-color:var(--green); color:var(--green);}
.btn-icon.spinning svg{animation:spin 0.7s linear infinite;}
@keyframes spin{ to{ transform:rotate(360deg); } }

.login-error{
  background:var(--danger-soft); color:var(--danger); border-radius:var(--radius-sm);
  padding:10px 13px; font-size:13px; margin-bottom:16px; display:none; font-weight:500;
}
.login-error.show{display:block; animation:shake .3s ease;}
@keyframes shake{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }

.api-base-note{
  margin-top:22px; padding-top:16px; border-top:1px dashed var(--line);
  font-size:11.5px; color:var(--muted); display:flex; justify-content:space-between; gap:8px;
}
.api-base-note code{font-family:var(--font-mono); background:var(--paper); padding:2px 6px; border-radius:4px;}

/* ============================================================
   APP SHELL
   ============================================================ */
.app{ display:none; min-height:100vh; }
.app.show{ display:flex; }

.sidebar{
  width:var(--sidebar-w); flex-shrink:0; background:var(--ink); color:var(--paper);
  display:flex; flex-direction:column; padding:22px 14px; position:fixed; top:0; left:0; bottom:0; overflow-y:auto;
}
.sidebar-mark{ display:flex; align-items:center; gap:10px; padding:0 8px 24px; }
.sidebar-mark .stamp-mark{
  width:32px; height:32px; border-radius:7px; background:var(--green); color:#fff;
  display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; font-size:15px;
  transform:rotate(-4deg); flex-shrink:0;
}
.sidebar-mark .wordmark{font-size:17px; color:#fff;}
.sidebar-mark .wordmark span{color:#6FBE99; font-style:italic;}

.nav-group{ margin-bottom:4px; }
.nav-label{ font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:#8A9389; padding:14px 12px 6px; font-weight:600;}
.nav-item{
  display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:var(--radius-sm);
  color:#C9CFC5; font-size:14px; font-weight:500; margin-bottom:2px; transition:background .12s ease, color .12s ease;
  border:none; background:none; width:100%; text-align:left;
}
.nav-item svg{ flex-shrink:0; opacity:0.85; }
.nav-item:hover{ background:rgba(255,255,255,0.06); color:#fff; }
.nav-item.active{ background:var(--green); color:#fff; }
.nav-item.active svg{ opacity:1; }
.nav-badge{
  margin-left:auto; background:var(--rust); color:#fff; font-size:10.5px; font-weight:700;
  padding:1px 6px; border-radius:10px; min-width:18px; text-align:center;
}

.sidebar-foot{ margin-top:auto; padding-top:16px; border-top:1px solid rgba(255,255,255,0.08); }
.user-chip{ display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:var(--radius-sm); }
.user-avatar{
  width:32px; height:32px; border-radius:50%; background:var(--green); color:#fff;
  display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0;
}
.user-meta{ overflow:hidden; }
.user-meta .name{ font-size:13.5px; color:#fff; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.user-meta .role{ font-size:11px; color:#8A9389; text-transform:capitalize; }
.logout-btn{
  width:100%; margin-top:8px; background:none; border:1.5px solid rgba(255,255,255,0.14); color:#C9CFC5;
  padding:9px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:7px;
}
.logout-btn:hover{ border-color:var(--rust); color:#fff; background:rgba(192,97,43,0.15); }

.main{ flex:1; margin-left:var(--sidebar-w); min-width:0; }
.topbar{
  position:sticky; top:0; z-index:20; background:rgba(247,244,236,0.92); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line); padding:16px 28px; display:flex; align-items:center; justify-content:space-between; gap:16px;
}
.topbar h2{ font-size:21px; }
.topbar .crumb{ font-size:12.5px; color:var(--muted); margin-top:2px; }
.topbar-actions{ display:flex; align-items:center; gap:10px; }
.content{ padding:24px 28px 56px; max-width:1320px; }

.menu-toggle{ display:none; background:none; border:none; padding:6px; color:var(--ink); }

/* ============================================================
   GENERIC UI PARTS
   ============================================================ */
.toolbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
.search-input{
  flex:1; min-width:180px; max-width:340px; padding:9px 13px 9px 36px; border:1.5px solid var(--line);
  border-radius:var(--radius-sm); font-size:13.5px; background:var(--paper-raised) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="%236B6457" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>') no-repeat 12px center;
}
.search-input:focus{ border-color:var(--green); outline:none; }
.filter-chips{ display:flex; gap:6px; }
.chip{
  padding:7px 13px; border-radius:999px; border:1.5px solid var(--line); background:var(--paper-raised);
  font-size:12.5px; font-weight:600; color:var(--muted); transition:all .12s ease;
}
.chip:hover{ border-color:var(--green); color:var(--ink); }
.chip.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
.tenant-tag{ font-size:13px; font-weight:600; color:var(--green-deep); }

.card{ background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow-sm); }
.card-pad{ padding:18px; }

.stat-row{ display:grid; grid-template-columns:repeat(auto-fit, minmax(170px,1fr)); gap:14px; margin-bottom:20px; }
.stat-card{ padding:16px 18px; }
.stat-card .label{ font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:600; margin-bottom:8px;}
.stat-card .value{ font-family:var(--font-display); font-size:26px; font-weight:600; }
.stat-card .sub{ font-size:12px; color:var(--muted); margin-top:4px; }
.stat-card.accent-green .value{ color:var(--green-deep); }
.stat-card.accent-rust .value{ color:var(--rust); }
.glance-card{ font-family:inherit; transition:border-color .12s, transform .1s; }
.glance-card:hover{ border-color:var(--green); }
.glance-card:active{ transform:scale(0.98); }

.table-wrap{ overflow-x:auto; border:1px solid var(--line); border-radius:var(--radius); background:var(--paper-raised); }
table{ width:100%; border-collapse:collapse; font-size:13.8px; min-width:640px; }
thead th{
  text-align:left; padding:12px 16px; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em;
  color:var(--muted); font-weight:600; border-bottom:1.5px solid var(--line); white-space:nowrap; background:#FBF9F4;
}
tbody td{ padding:13px 16px; border-bottom:1px solid var(--line); vertical-align:middle; }
tbody tr:last-child td{ border-bottom:none; }
tbody tr{ transition:background .1s ease; }
tbody tr:hover{ background:#FBF9F4; }
td.num, th.num{ text-align:right; font-family:var(--font-mono); }
td .row-actions{ display:flex; gap:6px; justify-content:flex-end; }

.pill{
  display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:999px;
  font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.03em;
}
.pill-dot{ width:6px; height:6px; border-radius:50%; }
.pill.available{ background:var(--success-soft); color:var(--success); }
.pill.available .pill-dot{ background:var(--success); }
.pill.occupied{ background:#E7E3F4; color:#5B4B9E; }
.pill.occupied .pill-dot{ background:#5B4B9E; }
.pill.active-pill{ background:var(--success-soft); color:var(--success); }
.pill.active-pill .pill-dot{ background:var(--success); }
.pill.inactive-pill{ background:var(--danger-soft); color:var(--danger); }
.pill.inactive-pill .pill-dot{ background:var(--danger); }
.pill.role-admin{ background:#FDEBD8; color:#9A5A12; }
.pill.role-tenant{ background:#E3EEFB; color:#1E5C9A; }

/* stamp badge — signature element for bill/payment status */
.stamp{
  display:inline-flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-weight:700; font-size:10.5px; letter-spacing:.06em;
  padding:4px 10px; border-radius:4px; border:2px solid currentColor;
  transform:rotate(-3deg); text-transform:uppercase;
}
.stamp.paid{ color:var(--success); }
.stamp.partial{ color:var(--partial); }
.stamp.pending{ color:var(--rust); }

.empty-state{ text-align:center; padding:64px 24px; color:var(--muted); }
.empty-state svg{ opacity:0.4; margin-bottom:14px; }
.empty-state h3{ font-size:16px; color:var(--ink); margin-bottom:6px; }
.empty-state p{ font-size:13.5px; max-width:340px; margin:0 auto; }

.skeleton-row{ height:46px; background:linear-gradient(90deg, #EFEBE0 25%, #F6F3EA 37%, #EFEBE0 63%); background-size:400% 100%; animation:shimmer 1.4s ease infinite; border-bottom:1px solid var(--line); }
@keyframes shimmer{ 0%{background-position:100% 0;} 100%{background-position:0 0;} }

.error-banner{
  background:var(--danger-soft); color:var(--danger); border-radius:var(--radius-sm); padding:13px 16px;
  font-size:13.5px; font-weight:500; margin-bottom:16px; display:flex; align-items:flex-start; gap:10px;
}
.error-banner svg{ flex-shrink:0; margin-top:1px; }
.error-banner button{ margin-left:auto; background:none; border:none; color:var(--danger); font-weight:700; font-size:16px; line-height:1; flex-shrink:0;}

/* Toasts */
.toast-stack{ position:fixed; bottom:20px; right:20px; z-index:1000; display:flex; flex-direction:column; gap:10px; max-width:340px; }
.toast{
  background:var(--ink); color:#fff; padding:13px 16px; border-radius:var(--radius-sm); box-shadow:var(--shadow-lg);
  font-size:13.5px; font-weight:500; display:flex; align-items:center; gap:10px; animation:toast-in .25s ease both;
}
.toast.success{ background:var(--green-deep); }
.toast.error{ background:var(--danger); }
.toast.fade-out{ animation:toast-out .25s ease forwards; }
@keyframes toast-in{ from{opacity:0; transform:translateX(20px);} to{opacity:1; transform:translateX(0);} }
@keyframes toast-out{ from{opacity:1;} to{opacity:0; transform:translateX(20px);} }

/* Modal */
.modal-overlay{
  position:fixed; inset:0; background:rgba(21,32,27,0.45); display:none; align-items:center; justify-content:center;
  z-index:500; padding:20px; backdrop-filter:blur(2px);
}
.modal-overlay.show{ display:flex; animation:fade-in .15s ease; }
@keyframes fade-in{ from{opacity:0;} to{opacity:1;} }
.modal{
  background:var(--paper-raised); border-radius:var(--radius); box-shadow:var(--shadow-lg); width:100%; max-width:560px;
  max-height:90vh; overflow-y:auto; animation:modal-in .2s ease both;
}
@keyframes modal-in{ from{opacity:0; transform:translateY(12px) scale(0.98);} to{opacity:1; transform:translateY(0) scale(1);} }
.modal-head{ padding:20px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; }
.modal-head h3{ font-size:18px; }
.modal-close{ background:none; border:none; color:var(--muted); padding:4px; }
.modal-close:hover{ color:var(--ink); }
.modal-body{ padding:22px; }
.modal-foot{ padding:16px 22px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:10px; }
.form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-grid .full{ grid-column:1 / -1; }
@media (max-width:520px){ .form-grid{ grid-template-columns:1fr; } }
.field select, .field textarea{
  width:100%; padding:11px 13px; border:1.5px solid var(--line); border-radius:var(--radius-sm); font-size:14.5px; background:var(--paper-raised);
}
.field select:disabled{ background:#F4F1E9; color:var(--muted); cursor:not-allowed; }
.field textarea{ resize:vertical; min-height:64px; font-family:var(--font-body); }
.field .hint{ font-size:11.5px; color:var(--muted); margin-top:5px; }
.field-error{ font-size:12px; color:var(--danger); margin-top:5px; font-weight:600; }
.field input.invalid, .field select.invalid{ border-color:var(--danger); }

.confirm-body{ padding:22px; font-size:14.5px; }
.confirm-body strong{ font-weight:700; }

/* ---- Info card used inside modals ---- */
.info-card{
  background:var(--paper); border:1.5px solid var(--line); border-radius:var(--radius-sm);
  padding:12px 14px; margin-top:4px; font-size:13px;
}
.info-card .info-row{ display:flex; justify-content:space-between; align-items:center; gap:10px; padding:3px 0; }
.info-card .info-label{ color:var(--muted); font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; }
.info-card .info-val{ font-weight:600; font-family:var(--font-mono); font-size:13px; }
.info-card .info-val.good{ color:var(--success); }
.info-card .info-val.warn{ color:var(--rust); }

/* ---- Step / path toggle inside modal ---- */
.path-toggle{
  display:flex; gap:0; border:1.5px solid var(--line); border-radius:var(--radius-sm); overflow:hidden; margin-bottom:18px;
}
.path-btn{
  flex:1; padding:10px 12px; background:var(--paper-raised); border:none; font-size:13.5px; font-weight:600;
  color:var(--muted); cursor:pointer; transition:background .12s, color .12s; border-right:1.5px solid var(--line);
  display:flex; align-items:center; justify-content:center; gap:7px;
}
.path-btn:last-child{ border-right:none; }
.path-btn.active{ background:var(--ink); color:#fff; }
.path-btn:hover:not(.active){ background:var(--paper); color:var(--ink); }

/* ---- Bill section inside payment modal ---- */
.bill-list{ display:flex; flex-direction:column; gap:8px; margin-top:6px; }
.bill-row{
  border:1.5px solid var(--line); border-radius:var(--radius-sm); padding:11px 13px;
  cursor:pointer; transition:border-color .12s, background .12s; display:flex; align-items:center; gap:12px;
}
.bill-row:hover{ border-color:var(--green); background:#F2F9F5; }
.bill-row.selected{ border-color:var(--green); background:#E8F4EE; }
.bill-row input[type=radio]{ accent-color:var(--green); width:15px; height:15px; flex-shrink:0; }
.bill-row-info{ flex:1; min-width:0; }
.bill-row-info .btype{ font-weight:700; font-size:13.5px; }
.bill-row-info .bmeta{ font-size:12px; color:var(--muted); margin-top:2px; }
.bill-row-amt{ text-align:right; flex-shrink:0; }
.bill-row-amt .bpending{ font-family:var(--font-mono); font-weight:700; font-size:14px; color:var(--rust); }
.bill-row-amt .bdue{ font-size:11.5px; color:var(--muted); margin-top:2px; }

/* ---- Unoccupied warning ---- */
.warn-box{
  background:var(--rust-soft); border:1.5px solid #E8C4A8; border-radius:var(--radius-sm);
  padding:11px 14px; font-size:13px; color:#7A3A18; display:flex; align-items:flex-start; gap:9px; margin-top:4px;
}
.warn-box svg{ flex-shrink:0; margin-top:1px; }

/* ---- Payment summary before save ---- */
.pay-summary{
  background:var(--success-soft); border:1.5px solid #A8D9C4; border-radius:var(--radius-sm);
  padding:13px 15px; margin-top:6px;
}
.pay-summary .ps-title{ font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--success); margin-bottom:8px; }
.pay-summary .ps-row{ display:flex; justify-content:space-between; font-size:13px; padding:3px 0; }
.pay-summary .ps-row .ps-key{ color:var(--muted); }
.pay-summary .ps-row .ps-val{ font-weight:600; }
.pay-summary .ps-row.ps-total .ps-val{ font-family:var(--font-mono); font-size:15px; color:var(--green-deep); }

/* Tenant portal (read-only, simplified) */
.tenant-shell{ width:100%; }
.tenant-topbar{
  background:var(--ink); color:#fff; padding:18px 24px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:20;
}
.tenant-content{ max-width:760px; margin:0 auto; padding:24px 18px 64px; }
.section-title{ font-size:17px; margin:28px 0 14px; display:flex; align-items:center; justify-content:space-between; }
.tenant-card{ background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; margin-bottom:10px; box-shadow:var(--shadow-sm); }
.tenant-card .row1{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px;}
.tenant-card .title{ font-weight:600; font-size:14.5px; }
.tenant-card .meta{ font-size:12.5px; color:var(--muted); }
.tenant-card .amt-row{ display:flex; justify-content:space-between; font-size:13px; padding-top:8px; border-top:1px dashed var(--line); margin-top:8px;}
.tenant-card .amt-row .big{ font-family:var(--font-mono); font-weight:700; font-size:15px; }

.spinner{ width:16px; height:16px; border:2.5px solid rgba(255,255,255,0.35); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; }
.spinner.dark{ border:2.5px solid rgba(21,32,27,0.2); border-top-color:var(--ink); }

.checkbox-list{ display:flex; flex-direction:column; gap:8px; max-height:220px; overflow-y:auto; border:1.5px solid var(--line); border-radius:var(--radius-sm); padding:10px; }
.checkbox-row{ display:flex; align-items:center; gap:9px; font-size:13.5px; padding:5px 6px; border-radius:5px; }
.checkbox-row:hover{ background:var(--paper); }
.checkbox-row input{ width:16px; height:16px; accent-color:var(--green); }

/* ---- Shop picker list (bulk bill creation) ---- */
.shop-pick-list{ display:flex; flex-direction:column; gap:7px; max-height:280px; overflow-y:auto; padding:2px; }
.shop-pick-row{
  display:flex; align-items:center; gap:11px; padding:10px 12px; border:1.5px solid var(--line);
  border-radius:var(--radius-sm); cursor:pointer; transition:border-color .12s, background .12s;
}
.shop-pick-row:hover{ border-color:var(--green); }
.shop-pick-row.checked-row{ border-color:var(--green); background:#F2F9F5; }
.shop-pick-check{ width:17px; height:17px; accent-color:var(--green); flex-shrink:0; cursor:pointer; }
.shop-pick-info{ flex:1; min-width:0; }
.shop-pick-num{ font-weight:700; font-size:14px; }
.shop-pick-meta{ font-size:11.5px; color:var(--muted); margin-top:2px; }
.shop-pick-amt-wrap{ display:flex; align-items:center; gap:4px; flex-shrink:0; }
.shop-pick-rupee{ font-family:var(--font-mono); color:var(--muted); font-size:13px; }
.shop-pick-amount{
  width:104px; padding:8px 9px; border:1.5px solid var(--line); border-radius:var(--radius-sm);
  font-family:var(--font-mono); font-size:13.5px; text-align:right; background:var(--paper-raised);
}
.shop-pick-amount:focus{ border-color:var(--green); outline:none; }
@media (max-width:480px){
  .shop-pick-row{ flex-wrap:wrap; }
  .shop-pick-amt-wrap{ width:100%; justify-content:flex-end; margin-left:28px; }
}

.visually-hidden{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }

/* Responsive */
@media (max-width:900px){
  .sidebar{ transform:translateX(-100%); transition:transform .2s ease; z-index:300; box-shadow:var(--shadow-lg); }
  .sidebar.open{ transform:translateX(0); }
  .main{ margin-left:0; }
  .menu-toggle{ display:flex; }
  .sidebar-scrim{ display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:290; }
  .sidebar-scrim.show{ display:block; }
  .content{ padding:18px 16px 90px; }
  .topbar{ padding:14px 16px; }
}
@media (max-width:560px){
  .topbar h2{ font-size:18px; }
  .stat-row{ grid-template-columns:repeat(2,1fr); }
  table{ font-size:13px; }
  thead th, tbody td{ padding:10px 12px; }
  .modal-overlay{ padding:0; align-items:flex-end; }
  .modal{ max-width:100%; max-height:92vh; border-radius:var(--radius) var(--radius) 0 0; animation:modal-in-sheet .2s ease both; }
  .modal-head{ padding:16px 16px 14px; }
  .modal-body{ padding:16px; }
  .modal-foot{ padding:12px 16px; padding-bottom:max(12px, env(safe-area-inset-bottom)); flex-wrap:wrap; }
  .modal-foot .btn{ flex:1; }
  .pay-summary, .info-card, .warn-box{ padding:11px 12px; }
}
@keyframes modal-in-sheet{ from{opacity:0; transform:translateY(24px);} to{opacity:1; transform:translateY(0);} }

/* ============================================================
   ENHANCED UI — filters, advanced search, user dashboard
   ============================================================ */
.filter-bar{
  background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius);
  padding:14px 16px; margin-bottom:18px; display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end;
}
.filter-bar .field{ margin:0; min-width:130px; flex:1; }
.filter-bar .field label{ font-size:11px; }
.filter-bar .field input,.filter-bar .field select{ font-size:13px; padding:8px 10px; }
.filter-bar .field.search-full{ flex:2; min-width:200px; }
.filter-count{ font-size:12.5px; color:var(--muted); font-weight:600; margin-left:auto; align-self:center; white-space:nowrap; }
.filter-clear-btn{ padding:8px 13px; font-size:12.5px; font-weight:600; white-space:nowrap; }

.sort-select{ padding:8px 10px; border:1.5px solid var(--line); border-radius:var(--radius-sm); font-size:13px; background:var(--paper-raised); color:var(--ink); }

/* Dashboard complex stats table */
.complex-stat-card{
  background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius);
  padding:14px 16px; box-shadow:var(--shadow-sm); transition:box-shadow .15s;
}
.complex-stat-card:hover{ box-shadow:var(--shadow-md); }
.complex-stat-card .c-name{ font-weight:700; font-size:14.5px; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.complex-stat-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.complex-stat-item{ text-align:center; }
.complex-stat-item .csi-val{ font-family:var(--font-mono); font-weight:700; font-size:16px; }
.complex-stat-item .csi-label{ font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; font-weight:600; }
.complex-stat-item.accent-green .csi-val{ color:var(--green-deep); }
.complex-stat-item.accent-rust .csi-val{ color:var(--rust); }

/* Collapsible sections for tenant portal */
.collapsible-section{ background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius); margin-bottom:12px; overflow:hidden; }
.collapsible-header{ display:flex; align-items:center; justify-content:space-between; padding:14px 18px; cursor:pointer; user-select:none; }
.collapsible-header h3{ font-size:15px; margin:0; }
.collapsible-arrow{ transition:transform .2s; }
.collapsible-header.open .collapsible-arrow{ transform:rotate(180deg); }
.collapsible-body{ display:none; border-top:1px solid var(--line); padding:16px 18px; }
.collapsible-body.open{ display:block; }

/* Tenant portal enhanced stats */
.tp-stat-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:16px; }
.tp-stat{ background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius); padding:12px 14px; }
.tp-stat .tp-label{ font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:600; margin-bottom:4px; }
.tp-stat .tp-value{ font-family:var(--font-display); font-size:20px; font-weight:600; }
.tp-stat.accent-green .tp-value{ color:var(--green-deep); }
.tp-stat.accent-rust .tp-value{ color:var(--rust); }
.tp-stat.accent-partial .tp-value{ color:var(--partial); }
@media(min-width:500px){ .tp-stat-grid{ grid-template-columns:repeat(4,1fr); } }

/* Monthly summary for tenant portal */
.month-row{
  border:1px solid var(--line); border-radius:var(--radius-sm); margin-bottom:8px; overflow:hidden;
}
.month-row-head{ display:flex; align-items:center; justify-content:space-between; padding:10px 14px; cursor:pointer; background:var(--paper-raised); }
.month-row-head .m-name{ font-weight:700; font-size:13.5px; }
.month-row-head .m-badges{ display:flex; gap:8px; align-items:center; }
.month-row-body{ display:none; border-top:1px solid var(--line); padding:12px 14px; background:#FAFAF8; }
.month-row-body.open{ display:block; }

/* Bills/Payments year→month drill-down */
.drill-crumb{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; font-size:12.5px; color:var(--muted); margin-bottom:12px; }
.drill-crumb span{ cursor:pointer; }
.drill-crumb span.active{ color:var(--ink); font-weight:700; cursor:default; }
.drill-crumb .sep{ color:var(--line); cursor:default; }
.drill-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
.drill-card{ background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; cursor:pointer; transition:border-color .12s, box-shadow .12s; }
.drill-card:hover{ border-color:var(--green); box-shadow:var(--shadow-sm); }
.drill-card .dc-title{ font-weight:700; font-size:15px; margin-bottom:6px; }
.drill-card .dc-count{ font-size:11.5px; color:var(--muted); margin-bottom:8px; }
.drill-card .dc-amt{ font-family:var(--font-mono); font-weight:700; font-size:15px; }
.drill-card .dc-pending{ font-size:11.5px; color:var(--rust); font-weight:600; margin-top:3px; }
.drill-card .dc-pending.clear{ color:var(--success); }
@media (max-width:480px){ .drill-grid{ grid-template-columns:repeat(2,1fr); gap:8px; } .drill-card{ padding:11px 12px; } }

/* Finance page user card */
.user-finance-card{ background:var(--paper-raised); border:1.5px solid var(--green); border-radius:var(--radius); padding:16px 18px; margin-bottom:16px; }
.user-finance-card .ufc-name{ font-weight:700; font-size:16px; margin-bottom:2px; }
.user-finance-card .ufc-meta{ font-size:12.5px; color:var(--muted); }

/* Deposit section in tenant portal */
.deposit-progress{ margin:12px 0; }
.deposit-bar-wrap{ background:var(--line); border-radius:999px; height:8px; overflow:hidden; margin-top:6px; }
.deposit-bar{ background:var(--green); height:100%; border-radius:999px; transition:width .4s ease; }

/* Records count tag */
.record-count-tag{ background:var(--paper); border:1px solid var(--line); border-radius:999px; padding:3px 10px; font-size:12px; font-weight:600; color:var(--muted); }

/* Empty state compact */
.empty-compact{ text-align:center; padding:28px 16px; color:var(--muted); font-size:13.5px; }

/* Year selector for tenant */
.year-btn-row{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
.year-btn{ padding:7px 14px; border-radius:999px; border:1.5px solid var(--line); background:var(--paper-raised); font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; transition:all .12s; }
.year-btn.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
.year-btn:hover:not(.active){ border-color:var(--ink); color:var(--ink); }
</style>

/* ================================================================

const API_BASE_URL = "http://13.205.70.46:8000";

/* ================================================================
   STATE
   ================================================================ */
const state = {
  token: localStorage.getItem('tms_token') || null,
  role: localStorage.getItem('tms_role') || null,
  currentUser: null,

/* ================================================================
   API LAYER
   ================================================================ */
class ApiError extends Error {
  constructor(message, status){ super(message); this.status = status; }
}

async function api(path, { method = 'GET', body = null, auth = true } = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (auth && state.token) headers['Authorization'] = `Bearer ${state.token}`;

  let res;
  try {
    res = await fetch(`${API_BASE_URL}${path}`, {
      method,
      headers,
      body: body ? JSON.stringify(body) : undefined,
    });
  } catch (err) {
    throw new ApiError(`Can't reach the server at ${API_BASE_URL}. Check the API_BASE_URL value and that the backend is running.`, 0);
  }

  let data = null;
  const text = await res.text();
  if (text) {
    try { data = JSON.parse(text); } catch { data = null; }
  }

  if (!res.ok) {
    let msg = `Request failed (${res.status})`;
    if (data) {
      if (typeof data.detail === 'string') msg = data.detail;
      else if (Array.isArray(data.detail)) msg = data.detail.map(d => d.msg).join(', ');
    }
    if (res.status === 401) { handleAuthExpired(); }
    throw new ApiError(msg, res.status);
  }
  return data;
}

function handleAuthExpired(){
  showToast('Your session expired. Please sign in again.', 'error');
  logout();
}

/* ================================================================
   TOASTS
   ================================================================ */
function showToast(message, type = 'default'){
  const stack = document.getElementById('toastStack');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icon = type === 'success'
    ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>'
    : type === 'error'
      ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
      : '';
  el.innerHTML = `${icon}<span>${escapeHtml(message)}</span>`;
  stack.appendChild(el);
  setTimeout(() => {
    el.classList.add('fade-out');
    setTimeout(() => el.remove(), 250);
  }, 3400);
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = String(str ?? '');
  return d.innerHTML;
}

/* ================================================================
   FORMATTERS
   ================================================================ */
const currency = (n) => '₹' + Number(n ?? 0).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const dateFmt = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
};
const initials = (name) => (name || '?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();

function daysLeftHtml(endIso){
  if (!endIso) return '<span style="color:var(--muted);">—</span>';
  const end = new Date(endIso);
  if (isNaN(end)) return '<span style="color:var(--muted);">—</span>';
  const today = new Date();
  today.setHours(0,0,0,0);
  end.setHours(0,0,0,0);
  const days = Math.round((end - today) / 86400000);
  if (days < 0) return `<span style="color:var(--rust); font-weight:700;">Expired ${Math.abs(days)}d ago</span>`;
  if (days === 0) return `<span style="color:var(--rust); font-weight:700;">Expires today</span>`;
  if (days <= 30) return `<span style="color:var(--rust); font-weight:600;">${days}d left</span>`;
  if (days <= 90) return `<span style="color:#b8860b; font-weight:600;">${days}d left</span>`;
  return `<span style="color:var(--success);">${days}d left</span>`;
}

function getTimeGreeting(name){
  const hour = new Date().getHours();
  let timePhrase = '';
  if (hour < 12) timePhrase = 'Good morning';
  else if (hour < 17) timePhrase = 'Good afternoon';
  else timePhrase = 'Good evening';

  const creativeMessages = [
    `${timePhrase}, ${name}! ✨`,
    `${timePhrase}, ${name} – your shops are ready!`,
    `${timePhrase}, ${name}! Let's get things done!`,
    `${timePhrase}, ${name} – we're all set for you.`,
    `${timePhrase}, ${name}! How can I help you today?`,
  ];
  return creativeMessages[Math.floor(Math.random() * creativeMessages.length)];
}

async function usersView(){

    ensureLoaded('users','/api/user'),

  // Calculate per-user summaries from shop data
  const userShopSummary = (uid) => {
    const owned = shops.filter(s => s.assigned_to?.id === uid);
    const totalRent = owned.reduce((sum,s)=>sum+Number(s.shop_rent||0),0);
    const totalDeposit = owned.reduce((sum,s)=>sum+Number(s.shop_deposit||0),0);
    // Nearest-expiring agreement across all of this tenant's shops (most urgent first)
    const endDates = owned.map(s => s.assigned_to?.agreement_end_date).filter(Boolean);
    const nearestEnd = endDates.length
      ? endDates.reduce((a,b) => new Date(a) < new Date(b) ? a : b)
      : null;
    return { count: owned.length, totalRent, totalDeposit, nearestEnd };
  };

  return `

            <td><span class="pill ${u.is_active ? 'active-pill' : 'inactive-pill'}"><span class="pill-dot"></span>${u.is_active ? 'active' : 'inactive'}</span></td>
            <td class="num">${summary ? summary.count : '—'}</td>
            <td class="num">${summary ? currency(summary.totalRent) : '—'}</td>
            <td class="num">${summary ? currency(summary.totalDeposit) : '—'}</td>
            <td>${summary ? daysLeftHtml(summary.nearestEnd) : '—'}</td>
            <td><div class="row-actions">
              ${u.role === 'tenant' ? `<button class="btn-icon" data-financial-summary="${u.id}" data-name="${escapeHtml(u.name)}" aria-label="Financial summary" title="Financial summary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></button>` : ''}

function initBillFilters(){
  const applyBillFilters = () => {
    const q = (document.getElementById('billSearch')?.value||'').trim().toLowerCase();
    const cid = document.getElementById('billFilterComplex')?.value||'';
    const uid = document.getElementById('billFilterUser')?.value||'';
    const status = document.getElementById('billFilterStatus')?.value||'';
    const type = document.getElementById('billFilterType')?.value||'';
    const month = document.getElementById('billFilterMonth')?.value||'';
    const year = document.getElementById('billFilterYear')?.value||'';
    const sort = document.getElementById('billSort')?.value||'newest';
    const tbody = document.getElementById('billsTbody');
    if (!tbody) return;
    const now = new Date();
    let rows = Array.from(tbody.querySelectorAll('tr'));
    rows.forEach(tr => {
      let show = true;
      if (q && !tr.dataset.search?.toLowerCase().includes(q)) show = false;
      if (cid && tr.dataset.complexId !== cid) show = false;
      if (uid && tr.dataset.userId !== uid) show = false;
      if (status === 'overdue') {
        const isOverdue = tr.dataset.status !== 'paid' && tr.dataset.due && new Date(tr.dataset.due) < now;
        if (!isOverdue) show = false;
      } else if (status === 'due-this-month') {
        const due = tr.dataset.due ? new Date(tr.dataset.due) : null;
        const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
        const monthEnd = new Date(now.getFullYear(), now.getMonth()+1, 0, 23, 59, 59);
        const isDueThisMonth = tr.dataset.status !== 'paid' && due && due >= monthStart && due <= monthEnd;
        if (!isDueThisMonth) show = false;
      } else if (status === 'outstanding') {
        if (tr.dataset.status === 'paid') show = false;
      } else if (status && tr.dataset.status !== status) show = false;
      if (type && tr.dataset.type !== type) show = false;
      if (month) { const due = tr.dataset.due; if (!due || String(new Date(due).getMonth()+1) !== month) show = false; }
      if (year) { const due = tr.dataset.due || tr.dataset.date; if (!due || String(new Date(due).getFullYear()) !== year) show = false; }
      tr.style.display = show ? '' : 'none';
    });
    // Sort visible rows
    const visRows = rows.filter(r => r.style.display !== 'none');
    visRows.sort((a,b) => {
      if (sort === 'newest') return new Date(b.dataset.date) - new Date(a.dataset.date);
      if (sort === 'oldest') return new Date(a.dataset.date) - new Date(b.dataset.date);
      if (sort === 'due-asc') return new Date(a.dataset.due) - new Date(b.dataset.due);
      if (sort === 'due-desc') return new Date(b.dataset.due) - new Date(a.dataset.due);
      if (sort === 'amount-high') return Number(b.dataset.amount) - Number(a.dataset.amount);
      if (sort === 'amount-low') return Number(a.dataset.amount) - Number(b.dataset.amount);
      if (sort === 'pending-first') return Number(b.dataset.pending) - Number(a.dataset.pending);
      if (sort === 'tenant') return (a.dataset.search||'').localeCompare(b.dataset.search||'');
      if (sort === 'bill-date-asc') return new Date(a.dataset.billDate) - new Date(b.dataset.billDate);
      if (sort === 'bill-date-desc') return new Date(b.dataset.billDate) - new Date(a.dataset.billDate);
      if (sort === 'created-at-asc') return new Date(a.dataset.createdAt) - new Date(b.dataset.createdAt);
      if (sort === 'created-at-desc') return new Date(b.dataset.createdAt) - new Date(a.dataset.createdAt);
      return 0;
    });
    visRows.forEach(r => tbody.appendChild(r));
    const count = visRows.length;
    const countEl = document.getElementById('billCount');
    if (countEl) countEl.textContent = count + ' record' + (count !== 1 ? 's' : '');
    const emptyEl = document.getElementById('billsEmpty');
    if (emptyEl) emptyEl.style.display = count === 0 ? 'block' : 'none';
  };

  ['billSearch','billFilterComplex','billFilterUser','billFilterStatus','billFilterType','billFilterMonth','billFilterYear','billSort']
    .forEach(id => { const el=document.getElementById(id); if(el) el.addEventListener(el.tagName==='INPUT'?'input':'change', applyBillFilters); });

  document.getElementById('billClearFilters')?.addEventListener('click', () => {
    ['billSearch','billFilterComplex','billFilterUser','billFilterStatus','billFilterType','billFilterMonth','billFilterYear'].forEach(id => { const el=document.getElementById(id); if(el) { el.value=''; } });
    applyBillFilters();
  });

  // Apply any filter requested from the dashboard's "at a glance" cards
  if (pendingBillsViewFilter) {
    const statusSel = document.getElementById('billFilterStatus');
    const pseudoLabels = { 'due-this-month':'Due this month', outstanding:'Tenants with dues (outstanding)' };
    if (statusSel) {
      if (pseudoLabels[pendingBillsViewFilter] && !statusSel.querySelector(`option[value="${pendingBillsViewFilter}"]`)) {
        statusSel.insertAdjacentHTML('beforeend', `<option value="${pendingBillsViewFilter}">${pseudoLabels[pendingBillsViewFilter]}</option>`);
      }
      if (['overdue','partial','paid','pending','due-this-month','outstanding'].includes(pendingBillsViewFilter)) {
        statusSel.value = pendingBillsViewFilter;
      }
    }
    pendingBillsViewFilter = null;
  }

  applyBillFilters();
}

function initPaymentFilters(){
  const apply = () => {
    const q = (document.getElementById('paySearch')?.value||'').trim().toLowerCase();
    const cid = document.getElementById('payFilterComplex')?.value||'';
    const uid = document.getElementById('payFilterUser')?.value||'';
    const method = document.getElementById('payFilterMethod')?.value||'';
    const month = document.getElementById('payFilterMonth')?.value||'';
    const year = document.getElementById('payFilterYear')?.value||'';
    const sort = document.getElementById('paySort')?.value||'newest';
    const tbody = document.getElementById('paymentsTbody');
    if (!tbody) return;
    let rows = Array.from(tbody.querySelectorAll('tr'));
    rows.forEach(tr => {
      let show = true;
      if (q && !tr.dataset.search?.toLowerCase().includes(q)) show = false;
      if (cid && tr.dataset.complexId !== cid) show = false;
      if (uid && tr.dataset.userId !== uid) show = false;
      if (method && tr.dataset.method !== method) show = false;
      if (month) { const d=tr.dataset.date; if(!d||String(new Date(d).getMonth()+1)!==month) show=false; }
      if (year) { const d=tr.dataset.date; if(!d||String(new Date(d).getFullYear())!==year) show=false; }
      tr.style.display = show ? '' : 'none';
    });
    const visRows = rows.filter(r=>r.style.display!=='none');
    visRows.sort((a,b) => {
      if (sort==='newest') return new Date(b.dataset.date)-new Date(a.dataset.date);
      if (sort==='oldest') return new Date(a.dataset.date)-new Date(b.dataset.date);
      if (sort==='amount-high') return Number(b.dataset.amount)-Number(a.dataset.amount);
      if (sort==='amount-low') return Number(a.dataset.amount)-Number(b.dataset.amount);
      if (sort==='tenant') return (a.dataset.search||'').localeCompare(b.dataset.search||'');
      return 0;
    });
    visRows.forEach(r=>tbody.appendChild(r));
    const count = visRows.length;
    const countEl = document.getElementById('payCount');
    if (countEl) countEl.textContent = count + ' record' + (count!==1?'s':'');
    const emptyEl = document.getElementById('paymentsEmpty');
    if (emptyEl) emptyEl.style.display = count===0?'block':'none';
  };
  ['paySearch','payFilterComplex','payFilterUser','payFilterMethod','payFilterMonth','payFilterYear','paySort']
    .forEach(id => { const el=document.getElementById(id); if(el) el.addEventListener(el.tagName==='INPUT'?'input':'change', apply); });
  document.getElementById('payClearFilters')?.addEventListener('click', () => {
    ['paySearch','payFilterComplex','payFilterUser','payFilterMethod','payFilterMonth','payFilterYear'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
    apply();
  });
  apply();
}

      filtered = filtered.filter(u => userShopMap[u.id] === true);
    } else if (statusFilter === 'inactive') {
      filtered = filtered.filter(u => userShopMap[u.id] !== true);
    }
    // Sort by name
    filtered.sort((a,b) => a.name.localeCompare(b.name));

    const sel = document.getElementById('fiUser');
    sel.innerHTML = '<option value="">— select tenant —</option>' +
      filtered.map(u => `<option value="${u.id}">${escapeHtml(u.name)} · ${escapeHtml(u.mobile)}</option>`).join('');

    // Clear selection if the previously selected tenant is no longer in the list
    const currentVal = sel.value;
    if (currentVal && !filtered.some(u => u.id === Number(currentVal))) {
      sel.value = '';
    }

    loadBtn.disabled = (filtered.length === 0);

    const container = document.getElementById('tenantSummaryContainer');

  }

  // ── Initial population (default status = 'all') ──

  // ── Status filter change ──
  document.getElementById('fiStatus').addEventListener('change', function() {
    populateTenantDropdown(this.value);
  });

  // ── Quick search (finds tenant and selects it if visible) ──
  let _fiSearchTimer;
  const fiSearch = document.getElementById('fiSearch');
  if (fiSearch) {
    fiSearch.addEventListener('input', () => {
      clearTimeout(_fiSearchTimer);
      _fiSearchTimer = setTimeout(() => {
        const q = fiSearch.value.trim().toLowerCase();
        if (!q) return;
        const users = state.cache.users || [];
        const match = users.find(u => u.role === 'tenant' && (u.name.toLowerCase().includes(q) || u.mobile.includes(q)));
        if (match) {
          const sel = document.getElementById('fiUser');
          const options = Array.from(sel.options);
          const found = options.some(opt => opt.value === String(match.id));
          if (found) {
            sel.value = match.id;
          } else {
            showToast('Tenant not visible with current status filter. Try changing Status to "All".', 'default');
          }
        }
      }, 300);
    });
  }

  // ── Load button ──
  document.getElementById('loadTenantSummaryBtn').addEventListener('click', loadTenantSummary);

  // ── (Optional) Auto‑load when tenant changes ──
  // document.getElementById('fiUser').addEventListener('change', loadTenantSummary);
}
async function loadTenantSummary(){
  const container = document.getElementById('tenantSummaryContainer');
  const uid = document.getElementById('fiUser').value;
  const complexId = document.getElementById('fiComplex').value;

  if (!uid) {
    container.innerHTML = `<div class="empty-state">${emptyIcon()}<h3>Select a tenant</h3><p>Choose a tenant from the dropdown and click Load.</p></div>`;
    return;
  }

  container.innerHTML = skeletonHtml();

  try {
    const user = state.cache.users.find(u => u.id === Number(uid));
    const data = await api(`/api/user/${uid}/financial-summary`);
    container.innerHTML = renderAdminTenantDashboard(data, user, complexId);
    // Attach bill filters
    attachAdminTenantBillFilters(container);
    // Attach collapsible toggles
    container.querySelectorAll('.collapsible-header').forEach(h => {
      h.addEventListener('click', function() {
        this.classList.toggle('open');
        const body = this.nextElementSibling;
        if (body) body.classList.toggle('open');
      });
    });
    container.querySelectorAll('.month-row-head').forEach(h => {
      h.addEventListener('click', function() {

      });

    container.innerHTML = errorBannerHtml(err.message);
    document.getElementById('retryBtn')?.addEventListener('click', loadTenantSummary);
  }
}

async function loadLedger(){
  const container = document.getElementById('ledgerContainer');
  const uid = document.getElementById('ldUser').value;
  const year = document.getElementById('ldYear').value;

  if (!uid) {
    container.innerHTML = `<div class="empty-state">${emptyIcon()}<h3>Select a tenant</h3><p>Choose a tenant and click Load.</p></div>`;
    return;
  }

  container.innerHTML = skeletonHtml();

    const data = await api(`/api/ledger/monthly?user_id=${uid}&year=${year}`);
    state._lastAdminLedgerData = { tenantName: data.tenant.name, tenantMobile: data.tenant.mobile, year, monthly: data.monthly, summary: data.summary, complexName: [...new Set(data.shops.map(s=>s.complex_name).filter(Boolean))].join(', ') };

function renderLedgerDashboard(data){

  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const monthlyRows = monthly.map((m, idx) => {
    const statusColor = m.status === 'Paid' ? 'var(--success)' :
                        m.status === 'Partial' ? 'var(--partial)' :

    return `

function renderAdminTenantDashboard(data, user, complexFilter){
  // data from /api/user/{id}/financial-summary
  const shops = data.shops || [];
  const bills = data.bills || [];
  const payments = data.payment_history || [];
  const depositPayments = data.deposit_payment_history || [];

  // Apply complex filter if needed
  let filteredShops = shops;
  if (complexFilter) {
    // We need to know complex_id for each shop – it's in the data
    filteredShops = shops.filter(s => s.complex_id === Number(complexFilter));
  }
  // If complex filter is applied, we should also filter bills to only those shops?
  // But bills are already linked to shops; we can filter bills by shop_id in filteredShops.
  const shopIds = new Set(filteredShops.map(s => s.id));
  const filteredBills = bills.filter(b => shopIds.has(b.shop_id));
  const filteredPayments = payments.filter(p => shopIds.has(p.shop_id));

  // Compute summary from filtered data
  const totalRent = filteredShops.reduce((sum, s) => sum + Number(s.shop_rent || 0), 0);
  const totalDeposit = filteredShops.reduce((sum, s) => sum + Number(s.shop_deposit || 0), 0);
  const pendingBills = filteredBills.filter(b => b.status !== 'paid');
  const pendingTotal = pendingBills.reduce((sum, b) => sum + Number(b.pending_amount || 0), 0);
  const paidTotal = filteredBills.reduce((sum, b) => sum + Number(b.paid_amount || 0), 0);
  const depositPaid = depositPayments.reduce((sum, d) => sum + Number(d.amount || 0), 0);
  const depositRemaining = Math.max(0, totalDeposit - depositPaid);
  const nextDue = pendingBills.filter(b => b.due_date).sort((a,b) => new Date(a.due_date) - new Date(b.due_date))[0];

  // Get complex names
  const complexes = state.cache.complexes || [];
  const complexMap = Object.fromEntries(complexes.map(c => [c.id, c.name]));

  // Build HTML (reusing the tenant portal design)
  return `
    <!-- Summary Cards -->
    <div class="tp-stat-grid">
      <div class="tp-stat"><div class="tp-label">Assigned Shops</div><div class="tp-value">${filteredShops.length}</div></div>

      <div class="tp-stat accent-green"><div class="tp-label">Deposit Paid</div><div class="tp-value" style="font-size:16px;">${currency(depositPaid)}</div></div>
      <div class="tp-stat ${depositRemaining>0?'accent-rust':'accent-green'}"><div class="tp-label">Deposit Status</div><div class="tp-value" style="font-size:14px;">${depositRemaining<=0 && totalDeposit>0 ? 'Fully paid' : currency(depositRemaining)+' due'}</div></div>
      <div class="tp-stat accent-rust"><div class="tp-label">Pending Rent</div><div class="tp-value" style="font-size:16px;">${currency(pendingTotal)}</div></div>
      <div class="tp-stat accent-green"><div class="tp-label">Total Paid</div><div class="tp-value" style="font-size:16px;">${currency(paidTotal)}</div></div>
      <div class="tp-stat accent-partial"><div class="tp-label">Next Due Date</div><div class="tp-value" style="font-size:14px;">${nextDue ? dateFmt(nextDue.due_date) : '—'}</div></div>
    </div>

    <!-- Profile Section -->
    <div class="collapsible-section">
      <div class="collapsible-header">
        <h3>My Profile</h3>
        <svg class="collapsible-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="collapsible-body">
        <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px;">
          <div><div style="font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.04em;">Name</div><div style="font-weight:600; margin-top:3px;">${escapeHtml(user.name)}</div></div>

          <div><div style="font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.04em;">Tenant ID</div><div class="mono" style="margin-top:3px;">#${user.id}</div></div>

function renderAdminMonthSummary(bills, payments){
  // Group by year-month (same as tenant portal)
  const months = {};
  bills.forEach(b => {
    const d = b.bill_date || b.created_at || b.due_date;
    if (!d) return;
    const dt = new Date(d);
    const key = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
    if (!months[key]) months[key] = { bills:[], payments:[] };
    months[key].bills.push(b);
  });
  payments.forEach(p => {
    const d = p.payment_date;
    if (!d) return;
    const dt = new Date(d);
    const key = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
    if (!months[key]) months[key] = { bills:[], payments:[] };
    months[key].payments.push(p);
  });

  const sortedKeys = Object.keys(months).sort((a,b)=>b.localeCompare(a));
  if (!sortedKeys.length) return '<div class="empty-compact">No billing history yet.</div>';

  return sortedKeys.map(key => {
    const [yr, mo] = key.split('-');
    const mName = new Date(Number(yr), Number(mo)-1).toLocaleString('en-IN',{month:'long', year:'numeric'});
    const mBills = months[key].bills;
    const mPays = months[key].payments;
    const rent = mBills.reduce((s,b)=>s+Number(b.amount||0),0);
    const paid = mBills.reduce((s,b)=>s+Number(b.paid_amount||0),0);
    const pending = mBills.reduce((s,b)=>s+Number(b.pending_amount||0),0);
    return `
    <div class="month-row">
      <div class="month-row-head">
        <div class="m-name">${mName}</div>
        <div class="m-badges">
          <span style="font-size:12px; color:var(--muted);">${currency(rent)} billed</span>
          ${pending>0?`<span class="stamp pending" style="transform:none; font-size:10px;">${currency(pending)} due</span>`:`<span class="stamp paid" style="transform:none; font-size:10px;">paid</span>`}
        </div>
      </div>
      <div class="month-row-body">
        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px;">
          <div><div style="font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase;">Rent</div><div class="mono" style="font-weight:700;">${currency(rent)}</div></div>
          <div><div style="font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase;">Paid</div><div class="mono" style="color:var(--success); font-weight:700;">${currency(paid)}</div></div>
          <div><div style="font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase;">Pending</div><div class="mono" style="color:${pending>0?'var(--rust)':'var(--success)'}; font-weight:700;">${currency(pending)}</div></div>
        </div>
        ${mBills.length ? `<div style="font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em;">Bills</div>
          ${mBills.map(b => `<div style="display:flex; justify-content:space-between; font-size:13px; padding:5px 0; border-bottom:1px dashed var(--line);">
            <span>${escapeHtml(b.bill_type)} · #${b.id}</span><span style="display:flex; gap:8px; align-items:center;">${stampHtml(b.status)} ${currency(b.pending_amount)} due</span>
          </div>`).join('')}` : ''}
        ${mPays.length ? `<div style="font-size:12px; font-weight:600; color:var(--muted); margin:10px 0 6px; text-transform:uppercase; letter-spacing:.04em;">Payments</div>
          ${mPays.map(p => `<div style="display:flex; justify-content:space-between; font-size:13px; padding:5px 0; border-bottom:1px dashed var(--line);">
            <span>${dateFmt(p.payment_date)} · ${escapeHtml(p.payment_method)}</span><span class="mono" style="color:var(--success); font-weight:700;">${currency(p.amount)}</span>
          </div>`).join('')}` : ''}
      </div>
    </div>`;
  }).join('');
}

// Admin tenant bill filters (identical to tenant portal but uses our container)
function attachAdminTenantBillFilters(container){
  const applyFilters = () => {
    const status = container.querySelector('#tpBillStatus')?.value || '';
    const shopId = container.querySelector('#tpBillShop')?.value || '';
    const month = container.querySelector('#tpBillMonth')?.value || '';
    const year = container.querySelector('#tpBillYear')?.value || '';
    const rows = container.querySelectorAll('.tp-bill-row');
    let count = 0;
    rows.forEach(r => {
      let show = true;
      if (status && r.dataset.status !== status) show = false;
      if (shopId && String(r.dataset.shopId) !== shopId) show = false;
      if (month) { const d = r.dataset.due; if (!d || String(new Date(d).getMonth()+1) !== month) show = false; }
      if (year) { const d = r.dataset.due; if (!d || String(new Date(d).getFullYear()) !== year) show = false; }
      r.style.display = show ? '' : 'none';
      if (show) count++;
    });
    const emp = container.querySelector('#tpBillEmpty');
    const lst = container.querySelector('#tpBillList');
    if (emp) emp.style.display = count === 0 ? 'block' : 'none';
    if (lst) lst.style.display = count === 0 ? 'none' : '';
  };

  container.querySelector('#tpBillStatus')?.addEventListener('change', applyFilters);
  container.querySelector('#tpBillShop')?.addEventListener('change', applyFilters);
  container.querySelector('#tpBillMonth')?.addEventListener('change', applyFilters);
  container.querySelector('#tpBillYear')?.addEventListener('input', applyFilters);

  // Global clear function for this container's filters
  window.clearAdminTpBillFilters = function() {
    container.querySelector('#tpBillStatus').value = '';
    container.querySelector('#tpBillShop').value = '';
    container.querySelector('#tpBillMonth').value = '';
    container.querySelector('#tpBillYear').value = '';
    applyFilters();
  };

  applyFilters();
}

  });

  document.getElementById('dpShop').addEventListener('change', async () => {
    const uid = Number(document.getElementById('dpTenant').value);
    const sid = Number(document.getElementById('dpShop').value);
    const infoEl = document.getElementById('dpDepositInfo');
    document.getElementById('saveBtn').disabled = !sid;
    if (!sid || !uid){ infoEl.style.display='none'; return; }
    try {
      const fs = await api(`/api/user/${uid}/financial-summary`);
      const shopDep = fs.deposit_summary;
      infoEl.innerHTML = `
        <div class="info-row"><span class="info-label">Deposit required</span><span class="info-val">${currency(shopDep?.total_deposit_required)}</span></div>
        <div class="info-row"><span class="info-label">Already paid</span><span class="info-val good">${currency(shopDep?.total_deposit_paid)}</span></div>
        <div class="info-row"><span class="info-label">Remaining</span><span class="info-val ${shopDep?.remaining_deposit > 0 ? 'warn' : 'good'}">${currency(shopDep?.remaining_deposit)}</span></div>
      `;
      infoEl.style.display = 'block';
      if (!document.getElementById('dpAmount').value) document.getElementById('dpAmount').value = Number(shopDep?.remaining_deposit || 0).toFixed(2);
    } catch(e){ infoEl.style.display='none'; }
  });

  document.getElementById('saveBtn').addEventListener('click', async () => {
    const uid = Number(document.getElementById('dpTenant').value);
    const sid = Number(document.getElementById('dpShop').value);
    const amount = parseFloat(document.getElementById('dpAmount').value);
    const payment_date = document.getElementById('dpDate').value;
    const remarks = document.getElementById('dpRemarks').value.trim();
    let ok = true;
    if (!uid){ showFieldError('dpTenantErr','Select a tenant'); ok=false; }
    if (!sid){ showFieldError('dpShopErr','Select a shop'); ok=false; }
    if (isNaN(amount)||amount<=0){ showFieldError('dpAmountErr','Enter a valid amount'); document.getElementById('dpAmount').classList.add('invalid'); ok=false; }
    if (!ok) return;
    await withSavingState('saveBtn', async () => {
      await api('/api/deposit-payment', { method:'POST', body:{ user_id:uid, shop_id:sid, amount, payment_date: new Date(payment_date).toISOString(), remarks } });
      closeModal();
      showToast(`Deposit of ${currency(amount)} recorded`, 'success');
      await renderView('deposits');
    });
  });
}

function attachReportsHandlers(){
  let _activeTab = 'business-overview';
  document.querySelectorAll('[data-rtab]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-rtab]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      _activeTab = btn.dataset.rtab;
    });
  });
  document.getElementById('genReportBtn').addEventListener('click', () => generateReport(_activeTab));
}

function renderReportHtml(rep, start, end){
  const occ = rep.occupancy, col = rep.collections, due = rep.outstanding_dues;
  const occupancyRate = occ.total_shops > 0 ? Math.round((occ.occupied / occ.total_shops) * 100) : 0;
  const users = state.cache.users || [];
  const shops = state.cache.shops || [];
  const userName = (id) => users.find(u=>u.id===id)?.name || `#${id}`;
  const shopNum = (id) => shops.find(s=>s.id===id)?.shop_number || `#${id}`;

  return `
  <div class="card-pad" style="padding:0 0 14px;"><div class="crumb">Report period: ${start ? dateFmt(start) : 'all time'} — ${end ? dateFmt(end) : 'today'}</div></div>

  <div class="stat-row">
    <div class="card stat-card"><div class="label">Occupancy</div><div class="value">${occupancyRate}%</div><div class="sub">${occ.occupied}/${occ.total_shops} shops occupied</div></div>
    <div class="card stat-card accent-green"><div class="label">Collected</div><div class="value mono">${currency(col.total_collected_in_range)}</div><div class="sub">${col.payments_received_count} payments</div></div>
    <div class="card stat-card"><div class="label">Billed</div><div class="value mono">${currency(col.total_billed_in_range)}</div><div class="sub">${col.bills_raised_count} bills raised</div></div>
    <div class="card stat-card accent-rust"><div class="label">Outstanding (all-time)</div><div class="value mono">${currency(due.total_outstanding)}</div><div class="sub">${due.bill_count} unpaid bills</div></div>
  </div>

  <div class="card" style="margin-bottom:18px;">
    <div class="card-pad" style="padding-bottom:0;"><h3 style="font-size:15.5px;">Shop occupancy breakdown</h3></div>
    <div class="card-pad" style="padding-top:14px; display:flex; gap:18px; flex-wrap:wrap;">
      <span class="pill occupied"><span class="pill-dot"></span>${occ.occupied} occupied</span>
      <span class="pill available"><span class="pill-dot"></span>${occ.available} available</span>
      ${occ.maintenance > 0 ? `<span class="pill" style="background:var(--partial-soft); color:var(--partial);"><span class="pill-dot" style="background:var(--partial);"></span>${occ.maintenance} maintenance</span>` : ''}
    </div>
  </div>

  ${Object.keys(col.collected_by_method).length > 0 ? `
  <div class="card" style="margin-bottom:18px;">
    <div class="card-pad" style="padding-bottom:0;"><h3 style="font-size:15.5px;">Collections by payment method</h3></div>
    <div class="table-wrap" style="border:none; border-radius:0; box-shadow:none; margin-top:10px;">
      <table><tbody>
        ${Object.entries(col.collected_by_method).map(([method,amt]) => `<tr><td>${escapeHtml(method)}</td><td class="num">${currency(amt)}</td></tr>`).join('')}
      </tbody></table>
    </div>
  </div>` : ''}

  <div class="card">
    <div class="card-pad" style="padding-bottom:0;"><h3 style="font-size:15.5px;">Outstanding dues</h3></div>
    ${due.bills.length === 0 ? emptyStateHtml('No outstanding dues', 'All bills are fully paid.', emptyIcon()) : `
    <div class="table-wrap" style="border:none; border-radius:0; box-shadow:none; margin-top:10px;">
      <table>
        <thead><tr><th>Bill</th><th>Tenant</th><th>Shop</th><th>Type</th><th>Description</th><th class="num">Pending</th><th>Status</th><th>Bill Date</th><th>Due</th></tr></thead>
        <tbody>
          ${due.bills.map(b => `<tr>
            <td class="mono">#${b.bill_id}</td>
            <td>${escapeHtml(userName(b.user_id))}</td>
            <td class="mono">${escapeHtml(shopNum(b.shop_id))}</td>
            <td>${escapeHtml(b.bill_type)}</td>
            <td>${escapeHtml(b.description || '—')}</td>
            <td class="num">${currency(b.pending_amount)}</td>
            <td>${stampHtml(b.status)}</td>
            <td>${dateFmt(b.bill_date)}</td>
            <td>${dateFmt(b.due_date)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`}
  </div>`;
}

    `Total outstanding: ${currency(due.total_outstanding)}`,
    `Unpaid bills: ${due.bill_count}`,
    ...due.bills.map(b => `  #${b.bill_id} | ${userName(b.user_id)} | Shop ${shopNum(b.shop_id)} | ${b.bill_type} | ${currency(b.pending_amount)} pending | due ${dateFmt(b.due_date)}`),
  ];

  const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `business-report-${start||'all'}-to-${end||'today'}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ---------- Business Overview tab: renderer + SVG charts ---------- */

function svgBarChart({width=560, height=200, bars, valueFormatter=(v)=>v, barColorFn=null, defaultColor='var(--ink)'}){
  const max = Math.max(1, ...bars.map(b=>b.value));
  const padL = 46, padB = 28, padT = 10, padR = 10;
  const plotW = width - padL - padR, plotH = height - padT - padB;
  const bw = plotW / bars.length;
  const gridLines = [0, 0.25, 0.5, 0.75, 1].map(f => {
    const y = padT + plotH - f*plotH;
    const val = Math.round(max*f);
    return `<line x1="${padL}" y1="${y}" x2="${width-padR}" y2="${y}" stroke="var(--line)" stroke-width="1"/>
            <text x="${padL-8}" y="${y+4}" font-size="10" fill="var(--muted)" text-anchor="end">${valueFormatter(val)}</text>`;
  }).join('');
  const barsHtml = bars.map((b,i)=>{
    const bh = (b.value/max) * plotH;
    const x = padL + i*bw + bw*0.2;
    const y = padT + plotH - bh;
    const w = bw*0.6;
    const color = barColorFn ? barColorFn(b) : defaultColor;
    return `<rect x="${x}" y="${y}" width="${w}" height="${Math.max(bh,1)}" fill="${color}" rx="2"/>
            <text x="${x+w/2}" y="${padT+plotH+18}" font-size="10.5" fill="var(--muted)" text-anchor="middle">${escapeHtml(b.label)}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" style="overflow:visible;">${gridLines}${barsHtml}</svg>`;
}

function svgGroupedTrendChart({width=640, height=220, months, valueFormatter=(v)=>v}){
  const max = Math.max(1, ...months.flatMap(m=>[m.billed, m.collected]));
  const padL = 52, padB = 28, padT = 12, padR = 10;
  const plotW = width - padL - padR, plotH = height - padT - padB;
  const groupW = plotW / months.length;
  const gridLines = [0, 0.25, 0.5, 0.75, 1].map(f => {
    const y = padT + plotH - f*plotH;
    const val = Math.round(max*f);
    return `<line x1="${padL}" y1="${y}" x2="${width-padR}" y2="${y}" stroke="var(--line)" stroke-width="1"/>
            <text x="${padL-8}" y="${y+4}" font-size="10" fill="var(--muted)" text-anchor="end">${valueFormatter(val)}</text>`;
  }).join('');
  const bars = months.map((m,i)=>{
    const gx = padL + i*groupW;
    const bw = groupW*0.32;
    const bhBilled = (m.billed/max)*plotH, bhCollected = (m.collected/max)*plotH;
    const x1 = gx + groupW*0.14, x2 = gx + groupW*0.54;
    return `
      <rect x="${x1}" y="${padT+plotH-bhBilled}" width="${bw}" height="${Math.max(bhBilled,1)}" fill="var(--muted)" opacity="0.55" rx="2"/>
      <rect x="${x2}" y="${padT+plotH-bhCollected}" width="${bw}" height="${Math.max(bhCollected,1)}" fill="var(--success, #3a7d5c)" rx="2"/>
      <text x="${gx+groupW/2}" y="${padT+plotH+18}" font-size="10.5" fill="var(--muted)" text-anchor="middle">${escapeHtml(m.month)}</text>`;
  }).join('');
  return `
    <svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" style="overflow:visible;">${gridLines}${bars}</svg>
    <div style="display:flex; gap:16px; margin-top:8px; font-size:12px; color:var(--muted);">
      <span><span style="display:inline-block; width:10px; height:10px; background:var(--muted); opacity:0.55; border-radius:2px; margin-right:5px;"></span>Billed</span>
      <span><span style="display:inline-block; width:10px; height:10px; background:var(--success, #3a7d5c); border-radius:2px; margin-right:5px;"></span>Collected</span>
    </div>`;
}

/* ---------- Generic PDF export for any report tab ---------- */

function exportReportPdf(){
  const data = state._lastReportData;
  if (!data) return;
  const { tab, rep, start, end } = data;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });
  const marginX = 40;
  let y = 44;

  const titles = {
    'business-overview': 'Business Overview Report',
    'tenant-statement': 'Tenant Bill Statement',
    'summary': 'Business Summary Report',
    'rent-collection': 'Rent Collection Report',
    'deposit': 'Deposit Report',
    'occupancy': 'Occupancy Report',
    'user-wise': 'User-wise Financial Report',
  };

  doc.setFillColor(58, 54, 46);
  doc.rect(0, 0, doc.internal.pageSize.getWidth(), 6, 'F');

  doc.setFontSize(11); doc.setFont(undefined, 'bold'); doc.setTextColor(58, 54, 46);
  doc.text('LEDGER', marginX, y);
  doc.setFontSize(8.5); doc.setFont(undefined, 'normal'); doc.setTextColor(130);
  doc.text('Shop & Tenant Management', marginX + 52, y);
  y += 22;

  doc.setDrawColor(220); doc.setLineWidth(0.6);
  doc.line(marginX, y, doc.internal.pageSize.getWidth() - marginX, y);
  y += 20;

  doc.setFontSize(16); doc.setFont(undefined, 'bold'); doc.setTextColor(0);
  doc.text(titles[tab] || 'Report', marginX, y); y += 20;
  doc.setFontSize(10); doc.setFont(undefined, 'normal'); doc.setTextColor(100);
  doc.text(`Period: ${start ? dateFmt(start) : 'all time'} — ${end ? dateFmt(end) : 'today'}`, marginX, y); y += 14;
  doc.text(`Generated: ${new Date().toLocaleString('en-IN')}`, marginX, y); y += 20;
  doc.setTextColor(0);

  const addKpiRow = (items) => {
    doc.setFontSize(9);
    items.forEach((it, i) => {
      const x = marginX + i * 130;
      doc.setFont(undefined, 'normal'); doc.setTextColor(110);
      doc.text(it.label, x, y);
      doc.setFont(undefined, 'bold'); doc.setTextColor(0);
      doc.text(String(it.value), x, y + 14);
    });
    y += 34;
  };

  const addTable = (head, body) => {
    doc.autoTable({ startY: y, head: [head], body, margin: { left: marginX, right: marginX }, styles: { fontSize: 8, cellPadding: 4 }, headStyles: { fillColor: [58, 54, 46] } });
    y = doc.lastAutoTable.finalY + 18;
  };

  if (tab === 'tenant-statement'){
    const s = rep.summary, u = rep.user;
    doc.setFontSize(10); doc.setFont(undefined, 'bold'); doc.setTextColor(0);
    doc.text(`${u.name}  ·  ${u.mobile||''}`, marginX, y); y += 16;
    addKpiRow([
      { label: 'Total billed', value: currency(s.total_billed) },
      { label: 'Total paid', value: currency(s.total_paid) },
      { label: 'Pending', value: currency(s.total_pending) },
    ]);
    doc.setFont(undefined, 'bold'); doc.setFontSize(11); doc.text('Bill history', marginX, y); y += 8;
    addTable(['Month', 'Bill', 'Type', 'Description', 'Bill Date', 'Due', 'Amount', 'Paid', 'Pending', 'Status'],
      rep.ledger.map(b => [b.bill_month||'—', `#${b.bill_id}`, b.bill_type, b.description||'—', dateFmt(b.bill_date), dateFmt(b.due_date), currency(b.amount), currency(b.paid_amount), currency(b.pending_amount), b.status]));

    const allPayments = rep.ledger.flatMap(b => b.payments.map(p => ({...p, bill_type: b.bill_type, bill_id: b.bill_id})))
      .sort((a,bx)=>new Date(a.payment_date)-new Date(bx.payment_date));
    doc.setFont(undefined, 'bold'); doc.setFontSize(11); doc.text('Payment history', marginX, y); y += 8;
    addTable(['Date', 'Bill', 'Type', 'Amount', 'Method'],
      allPayments.map(p => [dateFmt(p.payment_date), `#${p.bill_id}`, p.bill_type, currency(p.amount), p.payment_method]));

  } else if (tab === 'business-overview'){

    addTable(['Month', 'Billed', 'Collected'], rep.monthly_trend.map(m => [m.month, currency(m.billed), currency(m.collected)]));

    doc.setFont(undefined, 'bold'); doc.setFontSize(11); doc.text('Overdue aging', marginX, y); y += 8;

  } else if (tab === 'rent-collection'){
    const s = rep.summary;
    addKpiRow([
      { label: 'Total billed', value: currency(s.total_billed) },
      { label: 'Collected', value: currency(s.total_collected) },
      { label: 'Pending', value: currency(s.total_pending) },
